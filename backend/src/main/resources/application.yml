spring:
  application:
    name: performance-test-platform
  datasource:
    url: jdbc:h2:file:./storage/perftest;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true

server:
  port: 8080

platform:
  storage:
    root: ./storage
  execution:
    max-concurrent-tasks: 1
    failure-sample:
      per-label-limit: 10
      tail-interval-ms: 3000
  jmeter:
    executable: ${JMETER_EXECUTABLE:/Users/wangk/Documents/config/apache-jmeter-5.6.3/bin/jmeter}
    java-home: ${JMETER_JAVA_HOME:/Users/wangk/Documents/config/jdk-17.0.17+10/Contents/Home}
  distributed:
    influxdb-url: ${JMETER_INFLUXDB_URL:http://192.168.17.216:8086/write?db=jmeter}
    influxdb-measurement: ${JMETER_INFLUXDB_MEASUREMENT:jmeter_runtime}
    grafana-panel-url: ${JMETER_GRAFANA_PANEL_URL:http://192.168.17.216:3000/d/jmeter-5496/apache-jmeter-dashboard-using-core-influxdbbackendlistenerclient?orgId=1&refresh=5s}
    runner:
      python: ${REMOTE_RUNNER_PYTHON:python3}
      entry: ${REMOTE_RUNNER_ENTRY:./remote-runner/remote_jmeter_runner/main.py}
      connect-timeout-seconds: ${REMOTE_RUNNER_CONNECT_TIMEOUT_SECONDS:120}
      idle-timeout-seconds: ${REMOTE_RUNNER_IDLE_TIMEOUT_SECONDS:300}
      poll-interval-seconds: ${REMOTE_RUNNER_POLL_INTERVAL_SECONDS:10}
  monitoring:
    deploy:
      bundle-path: ${MONITORING_DEPLOY_BUNDLE_PATH:../deploy/monitoring/prometheus}
    prometheus:
      file-sd-path: ${PROMETHEUS_JMX_FILE_SD_PATH:./deploy/monitoring/prometheus/file_sd/jmx-targets.json}
      base-url: ${PROMETHEUS_BASE_URL:http://192.168.17.216:9090}
      query-timeout-ms: ${PROMETHEUS_QUERY_TIMEOUT_MS:5000}
