spring:
  application:
    name: performance-test-platform
  datasource:
    url: jdbc:h2:mem:perftest;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

server:
  port: 8080

platform:
  storage:
    root: ./storage
  execution:
    max-concurrent-tasks: 1
