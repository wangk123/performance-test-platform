spring:
  application:
    name: performance-test-platform
  datasource:
    url: jdbc:h2:file:./storage/perftest;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true

server:
  port: 8080

platform:
  storage:
    root: ./storage
  execution:
    max-concurrent-tasks: 1
