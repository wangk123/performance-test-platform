services:
  influxdb:
    image: influxdb:1.8
    container_name: perftest-influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: jmeter
      INFLUXDB_ADMIN_USER: ${INFLUXDB_ADMIN_USER:?set INFLUXDB_ADMIN_USER}
      INFLUXDB_ADMIN_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:?set INFLUXDB_ADMIN_PASSWORD}
      INFLUXDB_USER: ${INFLUXDB_USER:?set INFLUXDB_USER}
      INFLUXDB_USER_PASSWORD: ${INFLUXDB_USER_PASSWORD:?set INFLUXDB_USER_PASSWORD}
    volumes:
      - influxdb-data:/var/lib/influxdb

  dashboard-import:
    image: python:3.11-alpine
    container_name: perftest-grafana-dashboard-import
    entrypoint: ["python", "-c"]
    command: |
      import json, urllib.request
      data=json.load(urllib.request.urlopen('https://grafana.com/api/dashboards/5496/revisions/latest/download'))
      def patch(value):
          if value == '$${DS_INFLUXDB}':
              return 'JMeter InfluxDB'
          if isinstance(value, list):
              return [patch(item) for item in value]
          if isinstance(value, dict):
              return {key: patch(item) for key, item in value.items()}
          return value
      data=patch(data)
      data['uid']='jmeter-5496'
      data['refresh']='5s'
      json.dump(data, open('/dashboards/jmeter-5496.json', 'w'))
    volumes:
      - grafana-dashboards:/dashboards

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: perftest-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana:9.5.20
    container_name: perftest-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?set GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/jmx-dashboards
      - grafana-dashboards:/var/lib/grafana/dashboards
    depends_on:
      influxdb:
        condition: service_started
      prometheus:
        condition: service_started
      dashboard-import:
        condition: service_completed_successfully

volumes:
  influxdb-data:
  prometheus-data:
  grafana-data:
  grafana-dashboards:
